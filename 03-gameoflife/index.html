<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Game of Life — p5.js art</title>
<style>
  html, body { margin: 0; padding: 0; background: #050608; overflow: hidden; }
  .ui {
    position: fixed; top: 14px; left: 14px; z-index: 10;
    font-family: -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", sans-serif;
    font-size: 13px; color: #dfe8f0; display: flex; gap: 8px; align-items: center;
  }
  .ui a, .ui button {
    background: rgba(10,14,24,0.6); backdrop-filter: blur(6px);
    padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
    color: #dfe8f0; text-decoration: none; font-size: 13px; cursor: pointer;
  }
  .ui a:hover, .ui button:hover { background: rgba(30,44,72,0.75); }
  .hint {
    position: fixed; bottom: 14px; left: 14px; z-index: 10;
    font-family: -apple-system, sans-serif; font-size: 12px; color: #6a7488;
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
<div class="ui">
  <a href="../index.html">&larr; ギャラリーに戻る</a>
  <button onclick="randomize()">ランダムに撒き直す</button>
  <button onclick="clearGrid()">全消去</button>
</div>
<div class="hint">クリック／ドラッグで生命を描けます</div>
<script>
// ===== 03: Game of Life =====
// 各マスは「周囲8マスの生きている数」だけで次の生死が決まる。
// 単純なルールから、安定・点滅・移動する模様が自己組織化していく(創発)。
// マスの「年齢」で色を変え、止まった構造と動く構造を見分けられるようにした。
let cols, rows, grid, age;
const RES = 10;
function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  cols = floor(width / RES); rows = floor(height / RES);
  frameRate(12);
  grid = make2D(cols, rows); age = make2D(cols, rows);
  randomize();
}
function draw() {
  background(230, 30, 8);
  for (let i = 0; i < cols; i++) for (let j = 0; j < rows; j++) {
    if (grid[i][j] === 1) {
      fill((180 + age[i][j] * 4) % 360, 80, 95);
      noStroke();
      rect(i * RES, j * RES, RES - 1, RES - 1);
    }
  }
  let next = make2D(cols, rows);
  for (let i = 0; i < cols; i++) for (let j = 0; j < rows; j++) {
    const s = grid[i][j], n = countNeighbors(grid, i, j);
    if (s === 0 && n === 3) { next[i][j] = 1; age[i][j] = 0; }
    else if (s === 1 && (n < 2 || n > 3)) { next[i][j] = 0; age[i][j] = 0; }
    else { next[i][j] = s; if (s === 1) age[i][j]++; }
  }
  grid = next;
}
function countNeighbors(g, x, y) {
  let sum = 0;
  for (let i = -1; i <= 1; i++) for (let j = -1; j <= 1; j++) {
    sum += g[(x + i + cols) % cols][(y + j + rows) % rows];
  }
  return sum - g[x][y];
}
function make2D(c, r) { let a = new Array(c); for (let i = 0; i < c; i++) a[i] = new Array(r).fill(0); return a; }
function randomize() { for (let i = 0; i < cols; i++) for (let j = 0; j < rows; j++) grid[i][j] = floor(random(2)); }
function clearGrid() { grid = make2D(cols, rows); age = make2D(cols, rows); }
function paint() {
  const i = floor(mouseX / RES), j = floor(mouseY / RES);
  if (i >= 0 && i < cols && j >= 0 && j < rows) { grid[i][j] = 1; age[i][j] = 0; }
}
function mousePressed() { paint(); }
function mouseDragged() { paint(); }
function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  cols = floor(width / RES); rows = floor(height / RES);
  grid = make2D(cols, rows); age = make2D(cols, rows); randomize();
}
function keyPressed() { if (key === 's') saveCanvas('gameoflife', 'png'); }
</script>
</body>
</html>
