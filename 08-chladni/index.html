<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chladni Patterns — p5.js art</title>
<style>
  html, body { margin: 0; padding: 0; background: #0b0906; overflow: hidden; }
  .ui {
    position: fixed; top: 14px; left: 14px; z-index: 10;
    font-family: -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", sans-serif;
    font-size: 13px; color: #f0e9dd;
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .ui a, .ui button {
    background: rgba(30,24,14,0.55); backdrop-filter: blur(6px);
    padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
    color: #f0e9dd; text-decoration: none; font-size: 13px; cursor: pointer;
  }
  .ui a:hover, .ui button:hover { background: rgba(96,72,30,0.7); }
  .hint { opacity: 0.6; }
  .hud {
    position: fixed; bottom: 14px; left: 14px; z-index: 10;
    font-family: "Consolas", monospace; font-size: 11px; line-height: 1.7;
    color: rgba(240,233,221,0.45); pointer-events: none; white-space: pre;
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
<div class="ui">
  <a href="../index.html">&larr; ギャラリーに戻る</a>
  <button id="modeBtn" onclick="toggleAuto()">自動切替: オン</button>
  <button onclick="changeFreq()">周波数を変える</button>
  <span class="hint">ドラッグ: 砂を払う / s: 保存</span>
</div>
<div class="hud" id="hud"></div>
<script>
// ===== 08: Chladni図形(砂の共鳴)=====
// 振動する板に砂を撒くと、砂は「揺れない場所」=節線にだけ集まる。
// 板の定常波 f(x,y) = cos(nπx)cos(mπy) − cos(mπx)cos(nπy) の上で、
// 砂粒は「揺れが強いほど大きく跳ね、揺れが弱くなる方の跳びだけ(ほぼ)成立する」。
// 周波数を変えた瞬間は板全体に叩かれて砂が飛び散り(シェイク)、
// 1〜2秒かけて新しい節線に集まり直す——本物のクラドニ板の実験と同じ挙動。
// 図形が変わるたびに砂の色も変わる。

const NUM = 16000;        // 砂粒の数
const HOLD = 240;         // 結像した図形を見せる時間(約4秒)
let sx, sy;               // 砂粒の位置
let n = 3, m = 5;         // 振動モード(常に整数=古典的なクラドニ図形)
let auto = true;          // 自動で次の周波数へ切り替えていく
let shake = 0;            // >0 の間、砂は叩かれて飛び散っている
let settleT = 0;          // 結像を見せているフレーム数
let sandHue, sandCSS;
let bgCSS, fadeCSS, fadeShakeCSS;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  sx = new Float32Array(NUM);
  sy = new Float32Array(NUM);
  for (let i = 0; i < NUM; i++) { sx[i] = random(width); sy[i] = random(height); }
  sandHue = random(30, 55);
  setSandColor();
  // 描画はすべて canvas の fillStyle を直接使う。
  // p5 の fill() は色をキャッシュするため、直接操作と混ぜると
  // 「背景の塗り」がスキップされて画面が砂色一色になる。
  const bgc = color((sandHue + 200) % 360, 30, 4);
  const r = red(bgc) | 0, g = green(bgc) | 0, b = blue(bgc) | 0;
  bgCSS = `rgb(${r},${g},${b})`;
  fadeCSS = `rgba(${r},${g},${b},0.16)`;
  fadeShakeCSS = `rgba(${r},${g},${b},0.45)`;
  drawingContext.fillStyle = bgCSS;
  drawingContext.fillRect(0, 0, width, height);
}

function setSandColor() {
  const c = color(sandHue % 360, 48, 96);
  sandCSS = `rgba(${red(c) | 0},${green(c) | 0},${blue(c) | 0},0.9)`;
}

// 板の変位。0 になる線(節線)に砂が集まる
function plate(x, y) {
  const u = x / width, v = y / height;
  return Math.cos(n * Math.PI * u) * Math.cos(m * Math.PI * v)
       - Math.cos(m * Math.PI * u) * Math.cos(n * Math.PI * v);
}

function changeFreq() {
  const pn = n, pm = m;
  do {
    n = floor(random(1, 8));
    m = floor(random(1, 8));
  } while (n === m || (n === pn && m === pm));
  shake = 26;                                   // まず板を暴れさせる
  settleT = 0;
  sandHue = (sandHue + random(35, 90)) % 360;   // 図形ごとに砂の色を変える
  setSandColor();
}

function draw() {
  const ctx = drawingContext;
  // 残像を消す。シェイク中は古い模様を素早く拭き取る
  ctx.fillStyle = shake > 0 ? fadeShakeCSS : fadeCSS;
  ctx.fillRect(0, 0, width, height);

  if (auto && shake === 0 && ++settleT > HOLD) changeFreq();

  ctx.fillStyle = sandCSS;
  const mDown = mouseIsPressed && mouseY > 60;
  const shaking = shake > 0;
  for (let i = 0; i < NUM; i++) {
    let x = sx[i], y = sy[i];
    const f0 = Math.abs(plate(x, y));
    const amp = Math.min(1, f0);
    const a = Math.random() * 6.2831853;
    if (shaking) {
      // 周波数が変わった直後:揺れに叩かれて四方に飛び散る
      const step = 3 + amp * 9;
      x += Math.cos(a) * step;
      y += Math.sin(a) * step;
    } else {
      // 揺れが弱くなる跳びは成立、強くなる跳びもたまに成立(砂の攪拌)
      const step = amp * 3.5 + 0.15;
      const nx = x + Math.cos(a) * step;
      const ny = y + Math.sin(a) * step;
      if (Math.abs(plate(nx, ny)) <= f0 || Math.random() < 0.12) { x = nx; y = ny; }
    }
    // 指で砂を払う
    if (mDown) {
      const dx = x - mouseX, dy = y - mouseY, d2 = dx * dx + dy * dy;
      if (d2 < 4900 && d2 > 1) {
        const d = Math.sqrt(d2), push = (70 - d) * 0.25 / d;
        x += dx * push; y += dy * push;
      }
    }
    // 板の外にこぼれた砂は撒き直す
    if (x < 0 || x >= width || y < 0 || y >= height) {
      x = Math.random() * width; y = Math.random() * height;
    }
    sx[i] = x; sy[i] = y;
    ctx.fillRect(x, y, 1.5, 1.5);
  }
  if (shake > 0) shake--;

  if (frameCount % 15 === 0) {
    const hud = document.getElementById('hud');
    if (hud) hud.textContent =
      `mode  n ${n}  m ${m}\n` +
      `state ${shake > 0 ? 'shaking' : auto ? 'next in ' + Math.max(0, (HOLD - settleT) / 60).toFixed(1) + 's' : 'locked'}  grains ${NUM}`;
  }
}

function toggleAuto() {
  auto = !auto;
  settleT = 0;
  document.getElementById('modeBtn').textContent = '自動切替: ' + (auto ? 'オン' : 'オフ');
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  drawingContext.fillStyle = bgCSS;
  drawingContext.fillRect(0, 0, width, height);
  for (let i = 0; i < NUM; i++) { sx[i] = random(width); sy[i] = random(height); }
}
function keyPressed() { if (key === 's') saveCanvas('chladni', 'png'); }
</script>
</body>
</html>
