<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Drifting Circles — p5.js art</title>
<style>
  html, body { margin: 0; padding: 0; background: #14110d; overflow: hidden; }
  a.back {
    position: fixed; top: 14px; left: 14px; z-index: 10;
    font-family: -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", sans-serif;
    font-size: 13px; color: #e8e3d0; text-decoration: none;
    background: rgba(20,16,10,0.55); backdrop-filter: blur(6px);
    padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
  }
  a.back:hover { background: rgba(40,32,20,0.7); }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
<a class="back" href="../index.html">&larr; ギャラリーに戻る</a>
<script>
// ===== 01: Drifting Circles =====
// マウスを動かすと、その軌跡に半透明の円が重なっていく。
// draw() が毎フレーム呼ばれるという p5.js の基本を体感する最初のスケッチ。
function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  background(20);
}
function draw() {
  noStroke();
  fill(random(180, 280), 70, 90, 30);  // 色相を青〜紫に絞ってまとめる
  circle(mouseX, mouseY, random(10, 50));
}
function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  background(20);
}
function keyPressed() {
  if (key === 's') saveCanvas('circles', 'png');
}
</script>
</body>
</html>
